#version=RHEL9
# =============================================================================
# Kickstart: AlmaLinux 9 - KVM Host for Arista CVP 3-Node Cluster
# Target:    Latitude.sh bare metal (AMD EPYC 4484PX, 96GB RAM)
# Disks:     2x 480GB NVMe (OS, mdraid RAID1) + 2x 960GB NVMe (Data, mdraid RAID0)
# NICs:      2x 10GbE (DHCP at install; Ansible sets static post-install)
# Purpose:   KVM hypervisor hosting single Arista CVP VM per host
# =============================================================================

# ----------------------------------------------------------------------------
# Installation source & method
# ----------------------------------------------------------------------------
url --mirrorlist=https://mirrors.almalinux.org/mirrorlist/9/baseos
repo --name="AppStream" --mirrorlist=https://mirrors.almalinux.org/mirrorlist/9/appstream
repo --name="extras" --mirrorlist=https://mirrors.almalinux.org/mirrorlist/9/extras

text
skipx
firstboot --disable

# ----------------------------------------------------------------------------
# Locale, keyboard, timezone
# ----------------------------------------------------------------------------
lang en_US.UTF-8
keyboard --vckeymap=us --xlayouts='us'
timezone Australia/Sydney --utc

# ----------------------------------------------------------------------------
# Network - DHCP on both NICs at install time
# Ansible will configure static IPs, hostnames, and cluster interface post-install
# NIC 1 (enp*s0 / first interface): management / transit
# NIC 2 (enp*s0f1 / second interface): CVP cluster interconnect
# ----------------------------------------------------------------------------
network --bootproto=dhcp --activate --onboot=yes
network --bootproto=dhcp --onboot=yes

# ----------------------------------------------------------------------------
# Security
# ----------------------------------------------------------------------------
selinux --enforcing
firewall --enabled --service=ssh

# Root password locked - no password login permitted
# SSH access via key injected by Latitude.sh at provisioning time
# Ansible manages all further access and hardening post-install
rootpw --lock

# ----------------------------------------------------------------------------
# Bootloader
# ----------------------------------------------------------------------------
bootloader --location=none --driveorder=nvme0n1,nvme1n1 --timeout=5

# ----------------------------------------------------------------------------
# Disk configuration
#
# Device mapping (Latitude.sh NVMe naming - verify on first boot):
#   OS  drives: /dev/nvme0n1, /dev/nvme1n1  (2x 480GB)
#   Data drives: /dev/nvme2n1, /dev/nvme3n1  (2x 960GB)
#
# OS layout (RAID1 mirror ~480GB usable):
#   md0 -> /boot/efi   512MB  (EFI)
#   md1 -> /boot       1024MB (boot)
#   md2 -> pv.01       remainder -> vg_os -> lv_root (/)
#   No swap: KVM host with 96GB RAM; swapping is catastrophic for VM guests
#
# Data layout (RAID0 stripe ~1.92TB usable):
#   md3 -> pv.02       full stripe -> vg_data -> lv_libvirt (/var/lib/libvirt)
# ----------------------------------------------------------------------------

zerombr
clearpart --all --initlabel --drives=nvme0n1,nvme1n1,nvme2n1,nvme3n1

# --- OS drives: partition both identically for RAID1 ---
# nvme0n1
part raid.efi.0   --fstype=mdmember --ondisk=nvme0n1 --size=512
part raid.boot.0  --fstype=mdmember --ondisk=nvme0n1 --size=1024
part raid.os.0    --fstype=mdmember --ondisk=nvme0n1 --grow

# nvme1n1
part raid.efi.1   --fstype=mdmember --ondisk=nvme1n1 --size=512
part raid.boot.1  --fstype=mdmember --ondisk=nvme1n1 --size=1024
part raid.os.1    --fstype=mdmember --ondisk=nvme1n1 --grow

# --- Data drives: partition both for RAID0 ---
part raid.data.0  --fstype=mdmember --ondisk=nvme2n1 --grow
part raid.data.1  --fstype=mdmember --ondisk=nvme3n1 --grow

# --- RAID arrays ---
raid /boot/efi  --device=md0 --fstype=efi  --level=RAID1 raid.efi.0  raid.efi.1
raid /boot      --device=md1 --fstype=ext4 --level=RAID1 raid.boot.0 raid.boot.1
raid pv.01      --device=md2 --fstype=lvmpv --level=RAID1 raid.os.0  raid.os.1
raid pv.02      --device=md3 --fstype=lvmpv --level=RAID0 raid.data.0 raid.data.1

# --- LVM: OS volume group ---
volgroup vg_os pv.01
logvol / --vgname=vg_os --name=lv_root --fstype=xfs --grow --size=1

# --- LVM: Data volume group (KVM storage pool) ---
volgroup vg_data pv.02
logvol /var/lib/libvirt --vgname=vg_data --name=lv_libvirt --fstype=xfs --grow --size=1

# ----------------------------------------------------------------------------
# Package selection - minimal base + KVM virtualisation
# ----------------------------------------------------------------------------
%packages --ignoremissing
@^minimal-environment
@virtualization-host
qemu-kvm
libvirt
libvirt-client
virt-install
virt-manager
bridge-utils
tuned
tuned-profiles-cpu-partitioning
lvm2
mdadm
NetworkManager
NetworkManager-tui
openssh-server
chrony
rsync
wget
curl
vim-enhanced
bash-completion
policycoreutils-python-utils
python3
python3-libvirt
-iwl*firmware
-*-firmware
%end

# ----------------------------------------------------------------------------
# Pre-install script - verify NVMe device names
# If your Latitude.sh host uses different device names, adjust the
# disk section above accordingly
# ----------------------------------------------------------------------------
%pre --log=/tmp/ks-pre.log
#!/bin/bash
echo "=== NVMe devices detected ===" >> /tmp/ks-pre.log
ls -la /dev/nvme* >> /tmp/ks-pre.log 2>&1
lsblk -d -o NAME,SIZE,MODEL >> /tmp/ks-pre.log 2>&1
%end

# ----------------------------------------------------------------------------
# Post-install script
# ----------------------------------------------------------------------------
%post --log=/var/log/ks-post.log
#!/bin/bash

# --- Enable core services ---
systemctl enable libvirtd
systemctl enable chronyd
systemctl enable NetworkManager
systemctl enable tuned

# --- Tuned profile for virtualisation host ---
tuned-adm profile virtual-host

# --- mdadm: ensure array config is written ---
mdadm --detail --scan >> /etc/mdadm.conf
dracut --force

# --- KVM: enable nested virtualisation (AMD) ---
echo "options kvm_amd nested=1" > /etc/modprobe.d/kvm_amd.conf

# --- Firewall: CVP external-facing ports (management NIC / default zone) ---
# SSH
firewall-offline-cmd --add-port=22/tcp
firewall-offline-cmd --add-port=2222/tcp
# HTTP/HTTPS - UI, APIs, ZTP bootstrapping
firewall-offline-cmd --add-service=http
firewall-offline-cmd --add-service=https
firewall-offline-cmd --add-port=9443/tcp
firewall-offline-cmd --add-port=4443/tcp
# EOS device gRPC
firewall-offline-cmd --add-port=9910/tcp
# Wi-Fi AP proxy
firewall-offline-cmd --add-port=3851/tcp
firewall-offline-cmd --add-port=3851/udp
# SNMP
firewall-offline-cmd --add-port=161/udp
# Database operations UI
firewall-offline-cmd --add-port=8090/tcp

# --- Firewall: cluster NIC (NIC 2) - trust all inter-node traffic ---
# Arista recommends no firewall between cluster nodes
# Ansible will bind this zone to the correct interface and cluster subnet post-install
firewall-offline-cmd --new-zone=cvp-cluster
firewall-offline-cmd --zone=cvp-cluster --set-target=ACCEPT

# --- Kernel parameters for KVM host ---
cat >> /etc/sysctl.d/99-kvm-host.conf << 'EOF'
# Network performance
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
# No swap on KVM host - prevent kernel from swapping under any circumstance
vm.swappiness = 0
vm.dirty_ratio = 15
vm.dirty_background_ratio = 5
EOF

# --- SSH: install authorised public key for Ansible access ---
mkdir -p /root/.ssh
chmod 700 /root/.ssh
cat > /root/.ssh/authorized_keys << 'EOF'
ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOqnL8XxzP5s+CgdYx4OarX8KFubvTSiqs4EfYgfgmyk todd@sub.co
EOF
chmod 600 /root/.ssh/authorized_keys

# --- SSH: root access by key only, no password auth ---
cat > /etc/ssh/sshd_config.d/50-root-key-only.conf << 'EOF'
PermitRootLogin prohibit-password
PasswordAuthentication no
EOF
chmod 600 /etc/ssh/sshd_config.d/50-root-key-only.conf

# --- Placeholder: Ansible will configure ---
# - Static IP addressing (NIC 1 management, NIC 2 cluster)
# - Hostnames (cvp-kvm-host-01/02/03)
# - SSH hardening
# - CVP VM deployment
# - libvirt storage pool pointing to /var/lib/libvirt

echo "Kickstart post-install complete: $(date)" >> /var/log/ks-post.log
%end

# ----------------------------------------------------------------------------
reboot --eject
# ----------------------------------------------------------------------------
