#version=RHEL9

# ----------------------------------------------------------------------------
# Installation source - pinned to AlmaLinux 9.7 vault
# ----------------------------------------------------------------------------
url --url=https://vault.almalinux.org/9.7/BaseOS/x86_64/os/
repo --name="AppStream" --baseurl=https://vault.almalinux.org/9.7/AppStream/x86_64/os/
repo --name="extras" --baseurl=https://vault.almalinux.org/9.7/extras/x86_64/os/

text
skipx
firstboot --disable

# ----------------------------------------------------------------------------
# Locale, keyboard, timezone
# ----------------------------------------------------------------------------
lang en_US.UTF-8
keyboard --vckeymap=us --xlayouts='us'
timezone Australia/Sydney --utc

# ----------------------------------------------------------------------------
# Network - both NICs DHCP at install time.
# Whichever NIC is cabled to the WAN gets the public lease and comes up at
# boot - no reliance on NIC naming or MAC. A NIC with no DHCP server (e.g. the
# private/cluster port pre-Ansible) is kept from stalling boot by the short
# DHCP timeout drop-in in %post. Ansible sets statics/bridges post-install.
# ----------------------------------------------------------------------------
network --bootproto=dhcp --activate --onboot=yes
network --bootproto=dhcp --onboot=yes

# ----------------------------------------------------------------------------
# Security
# ----------------------------------------------------------------------------
selinux --enforcing
firewall --enabled --service=ssh

# Root password locked - SSH access via key in %post
rootpw --lock

# ----------------------------------------------------------------------------
# Bootloader - UEFI system (Supermicro AMI BIOS)
# ----------------------------------------------------------------------------
bootloader --timeout=5

# ----------------------------------------------------------------------------
# Disk configuration - no RAID, simple single drive layout
#
#   nvme0n1  (447GB) -> OS
#     p1 -> /boot/efi   512MB  FAT32
#     p2 -> /boot       1024MB ext4
#     p3 -> LVM PV      remainder -> vg_os -> lv_root (/)
#
#   nvme2n1 + nvme3n1 (894GB ea) -> RAID0 ~1.88TB -> vg_data -> lv_libvirt (/var/lib/libvirt)
#
#   nvme1n1 -> ignored (available for OS RAID later)
# ----------------------------------------------------------------------------

zerombr
clearpart --all --initlabel --drives=nvme0n1,nvme2n1,nvme3n1

# --- OS drive: nvme0n1 ---
part /boot/efi  --fstype=efi      --ondisk=nvme0n1 --size=512  --fsoptions="umask=0077,shortname=winnt"
part /boot      --fstype=ext4     --ondisk=nvme0n1 --size=1024
part pv.01      --fstype=lvmpv    --ondisk=nvme0n1 --grow

# --- Data drives: nvme2n1 + nvme3n1 -> linear LVM ~1.88TB ---
# LVM spans both drives linearly - simpler than RAID0, negligible performance
# difference on NVMe. Drive failure = rebuild CVP VM (acceptable per design)
part pv.02  --fstype=lvmpv --ondisk=nvme2n1 --grow
part pv.03  --fstype=lvmpv --ondisk=nvme3n1 --grow

# --- LVM: OS ---
volgroup vg_os pv.01
logvol / --vgname=vg_os --name=lv_root --fstype=xfs --grow --size=1

# --- LVM: Data (KVM storage pool) ~1.88TB ---
volgroup vg_data pv.02 pv.03
logvol /var/lib/libvirt --vgname=vg_data --name=lv_libvirt --fstype=xfs --grow --size=1

# ----------------------------------------------------------------------------
# Package selection - minimal base + KVM virtualisation
# ----------------------------------------------------------------------------
%packages --ignoremissing
@^minimal-environment
@virtualization-host
qemu-kvm
libvirt
libvirt-client
virt-install
bridge-utils
tuned
lvm2
NetworkManager
NetworkManager-tui
openssh-server
chrony
rsync
wget
curl
vim-enhanced
bash-completion
policycoreutils-python-utils
python3
python3-libvirt
-iwl*firmware
-*-firmware
%end

# ----------------------------------------------------------------------------
# Pre-install - log detected drives for verification
# ----------------------------------------------------------------------------
%pre --log=/tmp/ks-pre.log
#!/bin/bash
echo "=== Block devices detected ===" >> /tmp/ks-pre.log
lsblk -d -o NAME,SIZE,MODEL >> /tmp/ks-pre.log 2>&1
ls -la /dev/nvme* >> /tmp/ks-pre.log 2>&1
%end

# ----------------------------------------------------------------------------
# Post-install
# ----------------------------------------------------------------------------
%post --log=/var/log/ks-post.log
#!/bin/bash

# --- Network: short DHCP timeout so a NIC with no DHCP server doesn't stall
#     boot. Connection defaults - Ansible's static profiles override later.
cat > /etc/NetworkManager/conf.d/99-dhcp-timeout.conf << 'EOF'
[connection]
ipv4.dhcp-timeout=15
ipv4.may-fail=true
ipv6.may-fail=true
EOF

# --- wait-online: only require connectivity (mgmt up), not every NIC settled.
#     The private/cluster NIC has no DHCP server pre-Ansible and would retry
#     DHCP forever and fail this unit. Generic - no MAC/device pinning.
mkdir -p /etc/systemd/system/NetworkManager-wait-online.service.d
cat > /etc/systemd/system/NetworkManager-wait-online.service.d/override.conf << 'EOF'
[Service]
ExecStart=
ExecStart=/usr/bin/nm-online -q --timeout=30
EOF

# --- Enable core services ---
systemctl enable libvirtd
systemctl enable chronyd
systemctl enable NetworkManager
systemctl enable tuned

# --- Tuned profile for virtualisation host ---
tuned-adm profile virtual-host

# --- KVM: enable nested virtualisation (AMD) ---
echo "options kvm_amd nested=1" > /etc/modprobe.d/kvm_amd.conf

# --- Firewall: CVP external-facing ports (management NIC / default zone) ---
firewall-offline-cmd --add-port=22/tcp
firewall-offline-cmd --add-port=2222/tcp
firewall-offline-cmd --add-service=http
firewall-offline-cmd --add-service=https
firewall-offline-cmd --add-port=9443/tcp
firewall-offline-cmd --add-port=4443/tcp
firewall-offline-cmd --add-port=9910/tcp
firewall-offline-cmd --add-port=3851/tcp
firewall-offline-cmd --add-port=3851/udp
firewall-offline-cmd --add-port=161/udp
firewall-offline-cmd --add-port=8090/tcp

# --- Firewall: cluster NIC (NIC 2) - trust all inter-node traffic ---
firewall-offline-cmd --new-zone=cvp-cluster
firewall-offline-cmd --zone=cvp-cluster --set-target=ACCEPT

# --- Kernel parameters for KVM host ---
cat >> /etc/sysctl.d/99-kvm-host.conf << 'EOF'
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
vm.swappiness = 0
vm.dirty_ratio = 15
vm.dirty_background_ratio = 5
EOF

# --- SSH: authorised public key for Ansible access ---
mkdir -p /root/.ssh
chmod 700 /root/.ssh
cat > /root/.ssh/authorized_keys << 'EOF'
ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOqnL8XxzP5s+CgdYx4OarX8KFubvTSiqs4EfYgfgmyk todd@sub.co
EOF
chmod 600 /root/.ssh/authorized_keys

# --- SSH: key only, no password auth ---
cat > /etc/ssh/sshd_config.d/50-root-key-only.conf << 'EOF'
PermitRootLogin prohibit-password
PasswordAuthentication no
EOF
chmod 600 /etc/ssh/sshd_config.d/50-root-key-only.conf

echo "Kickstart post-install complete: $(date)" >> /var/log/ks-post.log
%end

# ----------------------------------------------------------------------------
reboot --eject
# ----------------------------------------------------------------------------
